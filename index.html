<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tu Nombre — Portafolio</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <header class="profile">
      <div class="profile__info">
        <h1 class="profile__name">Tu Nombre Aquí</h1>
        <p class="profile__bio">
          Aquí va tu descripción corta, copiada del diseño.
        </p>
        <div class="profile__links">
          <a href="#" class="profile__link">Descargar CV</a>
          <a href="#" class="profile__link">Enlace a GitHub</a>
        </div>
      </div>
      <img
        src="./images/profile-photo.jpg"
        alt="Foto de perfil"
        class="profile__photo"
      />
    </header>

    <section class="skills">
      <h2 class="skills__title">Habilidades y herramientas</h2>
      <div class="skills__icons">
        <!-- Aquí van los iconos: HTML, CSS, JS, Git, GitHub, etc -->
      </div>
    </section>

    <section class="projects">
      <h2 class="projects__title">Proyectos destacados</h2>
      <div class="projects__list">
        <article class="project-card">
          <img
            src="./images/project-1.jpg"
            alt="Página web de una cafetería"
            class="project-card__image"
          />
          <h3 class="project-card__title">Página web de una cafetería</h3>
          <p class="project-card__description">Descripción del proyecto.</p>
        </article>

        <article class="project-card">
          <img
            src="./images/project-2.jpg"
            alt="Mi proyecto"
            class="project-card__image"
          />
          <h3 class="project-card__title">Mi proyecto</h3>
          <p class="project-card__description">Descripción del proyecto.</p>
        </article>
      </div>
    </section>

    <footer class="contact">
      <h2 class="contact__title">Contacto</h2>
      <div class="contact__icons">
        <!-- Aquí van los iconos de redes sociales -->
      </div>
    </footer>
  </body>
</html>
